version: 1

rules:
  # --- Zero-dependency pattern rules: run with `npx archsentry scan`, no extras ---
  - id: no-direct-sql
    type: pattern
    severity: error
    description: "All database writes must go through the repository layer."
    match:
      patterns:
        - "INSERT INTO"
        - "UPDATE "
        - "DELETE FROM"
        - "db.query("
        - "connection.query("
      paths:
        - "**/*.ts"
        - "**/*.js"
      exclude:
        - "**/repositories/**"
        - "**/migrations/**"

  - id: no-hardcoded-secret
    type: pattern
    severity: error
    description: "Secrets must live in the secrets manager, not in source."
    match:
      patterns:
        - "sk-"
        - "AKIA"
        - "ghp_"
      paths:
        - "**/*.ts"
        - "**/*.js"
      exclude:
        - "**/*.test.ts"

  # --- AST-aware Semgrep rule: runs when the Semgrep CLI is installed ---
  # Services may not call .query() directly — that belongs in a repository.
  - id: services-use-repositories
    type: semgrep
    severity: error
    description: "Services must access persistence through repositories."
    semgrep:
      languages: ["typescript"]
      paths:
        include: ["src/services/**/*.ts"]
      pattern: $DB.query(...)

  - id: no-raw-dangerous-eval
    type: semgrep
    severity: error
    description: "Do not call eval() or the Function constructor in product code."
    semgrep:
      languages: ["typescript", "javascript"]
      pattern-either:
        - pattern: eval(...)
        - pattern: new Function(...)
